<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="product-title">Product Name - Triforma PH</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="product-container">
        
        <!-- Product Image Section -->
        <div class="product-left">
            <img id="product-image" src="" alt="Product Image" style="max-width:300px;">
        </div>

        <!-- Product Details Section -->
        <div class="product-right">
            <h1 id="product-name">Product Name</h1>
            <p id="product-description">Product description goes here.</p>
            
            <div class="product-price" id="product-price">0 PHP</div>
        
            
            <!-- Quantity Selector -->
            <div>
                <label for="product-qty">Quantity:</label>
                <button type="button" id="decrease-qty">-</button>
                <input type="number" name="quantity" id="product-qty" value="1" min="1">
                <button type="button" id="increase-qty">+</button>
                <p id="quantity-error" hidden>Quantity must be 1 or more.</p>
            </div>


            <!-- Add to Cart Button -->
            <button id="add-to-cart">Add to Cart</button>
            
            <!-- Back to Catalogue Link -->
            <div style="margin-top:20px;">
                <a href="catalogue.html">Back to Catalogue</a>
            </div>
        </div>
    </div>

    <!-- Product Data (to be set by each product page) -->
    <script>
    window.productData = {
        title: "Product Name - Triforma PH",
        image: "path/to/image.jpg",
        description: "Product description goes here.",
        price: "0 PHP"
    };
    </script>

    <!-- Product Functionality Script -->
    <script src="product.js"></script>

    <!-- Quantity Controls Script -->
    <script>
    document.addEventListener('DOMContentLoaded', function () {
        const qtyInput = document.getElementById('product-qty');
        const decreaseBtn = document.getElementById('decrease-qty');
        const increaseBtn = document.getElementById('increase-qty');
        const errorMessage = document.getElementById('quantity-error');

        function validateQuantity() {
            const qty = parseInt(qtyInput.value, 10);

            if (isNaN(qty) || qty < 1) {
                errorMessage.hidden = false;
                return false;
            }

            errorMessage.hidden = true;
            return true;
        }

        decreaseBtn.addEventListener('click', function () {
            const currentQty = parseInt(qtyInput.value, 10) || 1;
            if (currentQty > 1) {
                qtyInput.value = currentQty - 1;
            }
            validateQuantity();
        });

        increaseBtn.addEventListener('click', function () {
            const currentQty = parseInt(qtyInput.value, 10) || 1;
            qtyInput.value = currentQty + 1;
            validateQuantity();
        });

        qtyInput.addEventListener('change', validateQuantity);
    });
    </script>
</body>
</html>
